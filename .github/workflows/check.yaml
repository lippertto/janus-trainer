on:
  workflow_call: {}

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: yarn
      - name: yarn install
        run: yarn install
      - run: |
          yarn prisma generate
      - name: yarn format:check
        run: yarn format:check
      - name: yarn test
        run: yarn test

  api-tests:
    runs-on: ubuntu-latest
    env:
      POSTGRES_CONNECTION_URL: postgresql://postgres:postgress@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: yarn
      - name: yarn install
        run: yarn install
      - name: Start database
        run: docker compose up -d
      - name: Wait for database to be ready
        run: |
          timeout 30 bash -c 'until docker compose exec -T database pg_isready -U postgres; do sleep 1; done'
      - name: Generate Prisma client
        run: yarn prisma generate
      - name: Run database migrations
        run: yarn prisma migrate deploy
      - name: Seed database
        run: yarn prisma db seed
      - name: Run API tests
        run: yarn vitest -c api-tests/vite.config.ts
